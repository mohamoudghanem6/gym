<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Management System</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #0f172a;
        color: white;
      }

      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }

      .hero h1 {
        font-size: 60px;
        margin-bottom: 20px;
      }

      .hero p {
        font-size: 20px;
        color: #cbd5e1;
        margin-bottom: 30px;
      }

      .btn {
        padding: 15px 35px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        text-decoration: none;
        transition: 0.3s;
      }

      .btn:hover {
        background: #1d4ed8;
      }
    </style>
  </head>

  <body>
    <div class="hero">
      <h1>Gym Management System</h1>
      <p>
        Manage Members, Subscriptions, Payments and Dashboard Easily.
      </p>

      <a href="/login" class="btn">Get Started</a>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
